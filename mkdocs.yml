---
site_name: examexam
site_author: Matthew Martin <matthewdeanmartin@gmail.com>
site_description: CLI and local web app for generating, validating, and taking practice exams
repo_url: https://github.com/matthewdeanmartin/examexam
theme:
  name: readthedocs
  features: [navigation.footer]
edit_uri: edit/main/docs/
markdown_extensions:
  - attr_list
  - codehilite
  - toc:
      permalink: true
nav:
  - Index: index.md
  - Overview:
      - Readme.md: overview/README.md
      - Installation: installation.md
  - Taking Tests: usage/taking-tests.md
  - Creating Tests: usage/generating-tests.md
  - Hacking On Examexam: extending/how-it-works.md
  - Contributing: extending/CONTRIBUTING.md
  - Change Log: CHANGELOG.md
validation:
  nav:
    omitted_files: warn
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
plugins:
  - search
