[tox]
envlist =
    py311
;    py312
;    py313
    py314

requires =
    tox-uv>=1.28

[testenv]
deps =
    # parameterized
    pytest>=7.4.4
    pytest-cov>=4.1.0
commands =
     py.test --cov-report term-missing --cov=examexam --cov-fail-under=35
setenv =
    PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
